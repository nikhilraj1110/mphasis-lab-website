<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By the Numbers — Ticker Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{background:#060D17;color:#F0F7FC;font-family:'Manrope',sans-serif;overflow-x:hidden}

.ticker-wall{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(2rem,4vw,4rem) 0;gap:0;overflow:hidden}

.tw-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,247,252,.2);margin-bottom:clamp(2rem,4vw,3rem);display:flex;align-items:center;gap:12px}
.tw-eyebrow::before,.tw-eyebrow::after{content:'';width:24px;height:1px;background:rgba(240,247,252,.1)}

/* Ticker rows */
.tw-row{width:100%;overflow:hidden;position:relative;padding:clamp(1rem,2vw,1.5rem) 0}
.tw-row:hover .tw-track{animation-play-state:paused}

.tw-track{display:flex;width:max-content;gap:0}

.tw-row--top .tw-track{animation:scrollLeft 35s linear infinite}
.tw-row--bottom .tw-track{animation:scrollRight 40s linear infinite}

@keyframes scrollLeft{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes scrollRight{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}

/* Individual stat in ticker */
.tw-item{display:flex;align-items:baseline;gap:clamp(.4rem,1vw,.8rem);padding:0 clamp(1.5rem,3vw,3rem);white-space:nowrap;cursor:default;position:relative;transition:transform .3s ease}
.tw-item:hover{transform:scale(1.08)}

.tw-number{font-family:'JetBrains Mono',monospace;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1;letter-spacing:-.03em;background:linear-gradient(90deg,#D94F8A,#2DB5A3,#5AC16B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.tw-label{font-family:'JetBrains Mono',monospace;font-size:clamp(.5rem,.9vw,.7rem);letter-spacing:.1em;text-transform:uppercase;color:rgba(240,247,252,.3)}

.tw-diamond{color:rgba(240,247,252,.1);font-size:clamp(.5rem,.8vw,.65rem);padding:0 clamp(.5rem,1vw,1rem)}

/* Hover tooltip */
.tw-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(5px);font-family:'Manrope',sans-serif;font-size:.75rem;color:rgba(240,247,252,.6);background:rgba(6,13,23,.9);border:1px solid rgba(240,247,252,.08);padding:6px 14px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;backdrop-filter:blur(8px)}
.tw-item:hover .tw-tooltip{opacity:1;transform:translateX(-50%) translateY(0)}

/* Pulse line between rows */
.tw-pulse{width:100%;height:1px;position:relative;background:rgba(240,247,252,.03);overflow:hidden}
.tw-pulse::after{content:'';position:absolute;top:0;left:-20%;width:20%;height:100%;background:linear-gradient(90deg,transparent,#D94F8A,#2DB5A3,#5AC16B,transparent);animation:pulseSlide 3s ease-in-out infinite}

@keyframes pulseSlide{0%{left:-20%}100%{left:100%}}

/* Glow on numbers */
.tw-item:hover .tw-number{filter:drop-shadow(0 0 12px rgba(217,79,138,.3)) drop-shadow(0 0 24px rgba(45,181,163,.15))}

@media(max-width:768px){
  .tw-row--top .tw-track{animation-duration:25s}
  .tw-row--bottom .tw-track{animation-duration:30s}
}
</style>
</head>
<body>
<section class="ticker-wall">
  <div class="tw-eyebrow">By the Numbers</div>

  <div class="tw-row tw-row--top">
    <div class="tw-track" id="track-top"></div>
  </div>

  <div class="tw-pulse"></div>

  <div class="tw-row tw-row--bottom">
    <div class="tw-track" id="track-bottom"></div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const topStats = [
    { num: '25+', label: 'Research Projects', tip: 'Across AI, health, humanities, cybersecurity, and fabrication' },
    { num: '30+', label: 'Publications', tip: 'Peer-reviewed papers in top-tier journals and conferences' },
    { num: '40+', label: 'Partnerships', tip: 'With institutions, government agencies, and industry' },
    { num: '40+', label: 'Presentations & Talks', tip: 'At national and international venues' }
  ];

  const bottomStats = [
    { num: '6', label: 'Deployed Systems', tip: 'From epidemic modelling to diagnostic AI' },
    { num: '5', label: 'Research Pillars', tip: 'AI@Ashoka · BharatSim · CHART · Cybersecurity · Makerspace' },
    { num: '25+', label: 'Faculty Across 7 Departments', tip: 'Truly interdisciplinary research' },
    { num: '1,300+', label: 'Hackathon Applications', tip: 'For RedBrick Hacks, the Lab\'s flagship event' }
  ];

  function buildItem(stat) {
    return `<div class="tw-item">
      <div class="tw-tooltip">${stat.tip}</div>
      <span class="tw-number">${stat.num}</span>
      <span class="tw-label">${stat.label}</span>
    </div><span class="tw-diamond">◆</span>`;
  }

  function populateTrack(trackEl, stats, repeats) {
    let html = '';
    for (let i = 0; i < repeats; i++) {
      stats.forEach(s => { html += buildItem(s); });
    }
    trackEl.innerHTML = html;
  }

  // Duplicate enough for seamless loop
  populateTrack(document.getElementById('track-top'), topStats, 8);
  populateTrack(document.getElementById('track-bottom'), bottomStats, 8);
});
</script>
</body>
</html>
