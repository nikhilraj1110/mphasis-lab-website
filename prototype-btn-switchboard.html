<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By the Numbers — Switchboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{background:#060D17;color:#F0F7FC;font-family:'Manrope',sans-serif;overflow-x:hidden}

.switchboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(2rem,4vw,4rem)}

.sb-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,247,252,.2);margin-bottom:clamp(2rem,4vw,3.5rem);display:flex;align-items:center;gap:12px}
.sb-eyebrow::before,.sb-eyebrow::after{content:'';width:24px;height:1px;background:rgba(240,247,252,.1)}

.sb-grid{display:flex;flex-direction:column;gap:clamp(1.5rem,3vw,2.5rem);align-items:center;width:100%;max-width:1100px}

.sb-row{display:flex;gap:clamp(1rem,2vw,2rem);justify-content:center;flex-wrap:wrap}

/* Stagger: row 2 offset */
.sb-row:nth-child(2){padding-left:clamp(1rem,4vw,3rem)}

/* Individual display unit */
.sb-unit{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;transform:translateY(15px)}
.sb-unit.entered{opacity:1;transform:translateY(0);transition:opacity .5s ease,transform .5s ease}

.sb-display{display:flex;gap:3px;padding:clamp(12px,1.5vw,20px) clamp(14px,2vw,24px);background:linear-gradient(180deg,#141428,#0e0e20);border-radius:8px;box-shadow:inset 0 2px 8px rgba(0,0,0,.5),0 4px 20px rgba(0,0,0,.3),0 0 40px rgba(255,245,224,.02);border:1px solid rgba(255,255,255,.04)}

/* Single flap character */
.sb-flap{position:relative;width:clamp(28px,4vw,44px);height:clamp(42px,5.5vw,64px);perspective:200px}

.sb-flap-inner{position:relative;width:100%;height:100%;font-family:'JetBrains Mono',monospace;font-size:clamp(1.4rem,3vw,2.4rem);font-weight:700;color:#FFF5E0;text-shadow:0 0 10px rgba(255,245,224,.15)}

/* Top and bottom halves */
.sb-half{position:absolute;left:0;right:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a2e;border:1px solid rgba(255,255,255,.04)}

.sb-half--top{top:0;height:50%;border-radius:4px 4px 0 0;align-items:flex-end;border-bottom:none}
.sb-half--top span{transform:translateY(50%)}

.sb-half--bottom{bottom:0;height:50%;border-radius:0 0 4px 4px;align-items:flex-start;border-top:1px solid rgba(0,0,0,.6)}
.sb-half--bottom span{transform:translateY(-50%)}

/* Split line */
.sb-flap-inner::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.7);z-index:5;box-shadow:0 1px 0 rgba(255,255,255,.03)}

/* Flipping flap overlay */
.sb-flip{position:absolute;left:0;right:0;height:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a2e;border:1px solid rgba(255,255,255,.04);z-index:10;backface-visibility:hidden}

.sb-flip--top{top:0;border-radius:4px 4px 0 0;transform-origin:bottom center;align-items:flex-end;border-bottom:none}
.sb-flip--top span{transform:translateY(50%)}

.sb-flip--bottom{bottom:0;border-radius:0 0 4px 4px;transform-origin:top center;align-items:flex-start;border-top:1px solid rgba(0,0,0,.6)}
.sb-flip--bottom span{transform:translateY(-50%)}

/* Static chars like comma, plus */
.sb-static{width:clamp(14px,2vw,22px);height:clamp(42px,5.5vw,64px);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:clamp(1.2rem,2.5vw,2rem);font-weight:700;color:rgba(255,245,224,.4)}

/* Metal plate label */
.sb-plate{font-family:'JetBrains Mono',monospace;font-size:clamp(.45rem,.7vw,.6rem);letter-spacing:.12em;text-transform:uppercase;color:rgba(240,247,252,.2);padding:6px 16px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border-radius:3px;border:1px solid rgba(255,255,255,.04);text-align:center;max-width:200px}

@media(max-width:768px){
  .sb-row{flex-direction:column;align-items:center}
  .sb-row:nth-child(2){padding-left:0}
}
</style>
</head>
<body>
<section class="switchboard">
  <div class="sb-eyebrow">By the Numbers</div>
  <div class="sb-grid">
    <div class="sb-row" id="row1"></div>
    <div class="sb-row" id="row2"></div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const row1Data = [
    { chars: ['2','5'], suffix: '+', label: 'Research Projects' },
    { chars: ['3','0'], suffix: '+', label: 'Publications' },
    { chars: ['4','0'], suffix: '+', label: 'Partnerships' },
    { chars: ['4','0'], suffix: '+', label: 'Presentations & Talks' }
  ];
  const row2Data = [
    { chars: ['6'], suffix: '', label: 'Deployed Systems' },
    { chars: ['5'], suffix: '', label: 'Research Pillars' },
    { chars: ['2','5'], suffix: '+', label: 'Faculty Across 7 Depts' },
    { chars: ['1',',','3','0','0'], suffix: '+', label: 'Hackathon Applications' }
  ];

  function createFlap(targetChar, isStatic) {
    if (isStatic) {
      const el = document.createElement('span');
      el.className = 'sb-static';
      el.textContent = targetChar;
      return el;
    }

    const flap = document.createElement('div');
    flap.className = 'sb-flap';

    const inner = document.createElement('div');
    inner.className = 'sb-flap-inner';

    // Top half (static display)
    const top = document.createElement('div');
    top.className = 'sb-half sb-half--top';
    top.innerHTML = `<span>0</span>`;

    // Bottom half (static display)
    const bottom = document.createElement('div');
    bottom.className = 'sb-half sb-half--bottom';
    bottom.innerHTML = `<span>0</span>`;

    inner.appendChild(top);
    inner.appendChild(bottom);
    flap.appendChild(inner);

    flap.dataset.target = targetChar;
    return flap;
  }

  function animateFlap(flapEl, targetDigit, delay) {
    const target = parseInt(targetDigit);
    const top = flapEl.querySelector('.sb-half--top span');
    const bottom = flapEl.querySelector('.sb-half--bottom span');
    const inner = flapEl.querySelector('.sb-flap-inner');

    let current = 0;
    const steps = target + Math.floor(Math.random() * 5) + 5; // Extra cycles
    let step = 0;
    const interval = 60;

    setTimeout(() => {
      const flip = setInterval(() => {
        step++;
        const digit = step <= steps - target ? Math.floor(Math.random() * 10) : (target - (steps - step));
        const d = ((digit % 10) + 10) % 10;

        // Create flip animation
        const flipTop = document.createElement('div');
        flipTop.className = 'sb-flip sb-flip--top';
        flipTop.innerHTML = `<span>${top.textContent}</span>`;
        flipTop.style.color = '#FFF5E0';
        flipTop.style.textShadow = '0 0 10px rgba(255,245,224,.15)';
        flipTop.style.fontSize = getComputedStyle(top.parentElement).fontSize;
        flipTop.style.fontFamily = "'JetBrains Mono', monospace";
        flipTop.style.fontWeight = '700';
        inner.appendChild(flipTop);

        // Animate top half flipping down
        flipTop.animate([
          { transform: 'rotateX(0deg)' },
          { transform: 'rotateX(-90deg)' }
        ], { duration: interval * .6, easing: 'ease-in', fill: 'forwards' });

        setTimeout(() => {
          top.textContent = d;
          bottom.textContent = d;
          if (flipTop.parentElement) flipTop.remove();
        }, interval * .5);

        if (step >= steps) {
          clearInterval(flip);
          top.textContent = targetDigit;
          bottom.textContent = targetDigit;
        }
      }, interval);
    }, delay);
  }

  function createUnit(data) {
    const unit = document.createElement('div');
    unit.className = 'sb-unit';

    const display = document.createElement('div');
    display.className = 'sb-display';

    data.chars.forEach(ch => {
      const isStatic = ch === ',';
      const flap = createFlap(ch, isStatic);
      display.appendChild(flap);
    });

    if (data.suffix) {
      const suf = document.createElement('span');
      suf.className = 'sb-static';
      suf.textContent = data.suffix;
      suf.style.color = 'rgba(255,245,224,.25)';
      display.appendChild(suf);
    }

    const plate = document.createElement('div');
    plate.className = 'sb-plate';
    plate.textContent = data.label;

    unit.appendChild(display);
    unit.appendChild(plate);
    return unit;
  }

  const row1El = document.getElementById('row1');
  const row2El = document.getElementById('row2');

  const allUnits = [];

  row1Data.forEach(d => {
    const u = createUnit(d);
    row1El.appendChild(u);
    allUnits.push(u);
  });

  row2Data.forEach(d => {
    const u = createUnit(d);
    row2El.appendChild(u);
    allUnits.push(u);
  });

  // Staggered entrance + flip animation
  allUnits.forEach((unit, i) => {
    const delay = 200 + i * 250;

    setTimeout(() => {
      unit.classList.add('entered');

      // Animate each flap in this unit
      const flaps = unit.querySelectorAll('.sb-flap');
      flaps.forEach((flap, fi) => {
        animateFlap(flap, flap.dataset.target, fi * 80);
      });
    }, delay);
  });
});
</script>
</body>
</html>
